name: CI

on:
    push:
        branches:
            - main
    workflow_dispatch:

jobs:
    unit-tests-backend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: "Execute Backend unit Tests"
              working-directory: ./bugtracker-backend
              run: |
                go test -v ./...

